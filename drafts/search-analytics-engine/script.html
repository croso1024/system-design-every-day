<script>
(function () {
  'use strict';

  var DOCS = [
    { id: 'doc1', title: 'Doc 1 · 2PC', body: '分散式 交易 使用 兩階段 提交 協調者 一致性', visible: true },
    { id: 'doc2', title: 'Doc 2 · Replication', body: '資料 複寫 主從 架構 最終 一致 延遲', visible: true },
    { id: 'doc3', title: 'Doc 3 · Sharding', body: '資料 分片 雜湊 路由 分散式 擴展', visible: true }
  ];

  var pendingDoc = null;
  var matchOp = 'or';
  var totalDocs = 3;

  function $(id) { return document.getElementById(id); }

  function tokenize(text) {
    return text.toLowerCase()
      .replace(/[^\w一-鿿\s]/g, ' ')
      .split(/\s+/)
      .filter(function (t) { return t.length > 0; });
  }

  function buildIndex(docs) {
    var index = {};
    docs.forEach(function (doc) {
      if (!doc.visible) return;
      var tokens = tokenize(doc.body);
      var tfMap = {};
      tokens.forEach(function (t) {
        tfMap[t] = (tfMap[t] || 0) + 1;
      });
      Object.keys(tfMap).forEach(function (term) {
        if (!index[term]) index[term] = [];
        index[term].push({ docId: doc.id, tf: tfMap[term] });
      });
    });
    return index;
  }

  function docIdSet(term, index) {
    var posting = index[term];
    if (!posting) return [];
    return posting.map(function (p) { return p.docId; });
  }

  // OR = 聯集；AND = 交集。缺 posting 的 term 在 AND 下讓交集為空。
  function combine(sets, op) {
    if (!sets.length) return [];
    if (op === 'and') {
      return sets.reduce(function (acc, s) {
        return acc.filter(function (id) { return s.indexOf(id) !== -1; });
      });
    }
    var seen = {};
    var out = [];
    sets.forEach(function (s) {
      s.forEach(function (id) {
        if (!seen[id]) { seen[id] = 1; out.push(id); }
      });
    });
    return out;
  }

  function bm25Score(docId, posting, N, avgdl, docLen) {
    var df = posting.length;
    var idf = Math.log(1 + (N - df + 0.5) / (df + 0.5));
    var tf = posting.find(function (p) { return p.docId === docId; });
    if (!tf) return 0;
    var f = tf.tf;
    var k1 = 1.2;
    var b = 0.75;
    var tfNorm = (f * (k1 + 1)) / (f + k1 * (1 - b + b * (docLen / avgdl)));
    return idf * tfNorm;
  }

  function scoreDoc(doc, queryTerms, index, allDocs) {
    var visibleDocs = allDocs.filter(function (d) { return d.visible; });
    var N = visibleDocs.length || 1;
    var lens = visibleDocs.map(function (d) { return tokenize(d.body).length; });
    var avgdl = lens.reduce(function (a, b) { return a + b; }, 0) / (lens.length || 1);
    var docLen = tokenize(doc.body).length;
    var score = 0;
    queryTerms.forEach(function (qt) {
      var posting = index[qt];
      if (!posting) return;
      var hit = posting.find(function (p) { return p.docId === doc.id; });
      if (hit) {
        score += bm25Score(doc.id, posting, N, avgdl, docLen);
      }
    });
    return score;
  }

  function renderCorpus() {
    var el = $('demo-corpus');
    if (!el) return;
    el.innerHTML = '';
    DOCS.forEach(function (doc) {
      var row = document.createElement('div');
      row.style.cssText = 'font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start';
      var dot = document.createElement('i');
      dot.className = 'dot ' + (doc.visible ? 'ns-ok' : 'ns-wait');
      dot.style.flexShrink = '0';
      dot.style.marginTop = '4px';
      var txt = document.createElement('span');
      txt.innerHTML = '<b style="font-family:var(--mono);font-size:11px">' + doc.id + '</b> ' + doc.body;
      row.appendChild(dot);
      row.appendChild(txt);
      el.appendChild(row);
    });
    if (pendingDoc) {
      var prow = document.createElement('div');
      prow.style.cssText = 'font-size:12.5px;padding:6px 0;display:flex;gap:8px;align-items:flex-start;opacity:.85';
      var pdot = document.createElement('i');
      pdot.className = 'dot ns-wait';
      pdot.style.flexShrink = '0';
      pdot.style.marginTop = '4px';
      var ptxt = document.createElement('span');
      ptxt.innerHTML = '<b style="font-family:var(--mono);font-size:11px">' + pendingDoc.id + '</b> ' + pendingDoc.body + ' <span style="color:var(--warn)">(buffer)</span>';
      prow.appendChild(pdot);
      prow.appendChild(ptxt);
      el.appendChild(prow);
    }
  }

  function renderIndex() {
    var el = $('demo-index');
    if (!el) return;
    var index = buildIndex(DOCS);
    var terms = Object.keys(index).sort();
    if (!terms.length) {
      el.textContent = '(empty — no visible docs)';
      return;
    }
    el.innerHTML = terms.map(function (term) {
      var plist = index[term].map(function (p) { return p.docId + ':' + p.tf; }).join(', ');
      return '<div><span style="color:var(--accent)">' + term + '</span> → [' + plist + ']</div>';
    }).join('');
  }

  function termChip(t) {
    return '<span style="padding:2px 8px;border:1px solid var(--border-strong);border-radius:5px;background:var(--bg);font-family:var(--mono);font-size:11px">' + t + '</span>';
  }

  function idChip(id) {
    return '<span style="padding:1px 7px;border:1px solid var(--accent);border-radius:5px;background:var(--accent-soft);color:var(--accent);font-family:var(--mono);font-size:10.5px">' + id + '</span>';
  }

  function renderPipeline(query) {
    var el = $('demo-pipeline');
    if (!el) return;
    var q = (query || '').trim();
    if (!q) {
      el.innerHTML = '<span style="color:var(--text-3);font-size:13px">輸入查詢後按「搜尋」，這裡會逐步演出：分詞 → 查 posting list → 依 ' + matchOp.toUpperCase() + ' 合併 → 送入 BM25。</span>';
      return;
    }
    var queryTerms = tokenize(q);
    var index = buildIndex(DOCS);

    var s1 = '<div style="display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:11px">' +
      '<span style="font-family:var(--mono);font-size:10.5px;color:var(--text-3);flex:0 0 116px">① 分詞（standard）</span>' +
      '<span style="font-size:12.5px">「' + q + '」</span>' +
      '<span style="color:var(--text-3)">→</span>' +
      (queryTerms.length ? queryTerms.map(termChip).join(' ') : '<span style="color:var(--text-3);font-size:12px">（無 term）</span>') +
      '</div>';

    var sets = [];
    var rows = queryTerms.map(function (t) {
      var ids = docIdSet(t, index);
      sets.push(ids);
      var right = ids.length
        ? ids.map(idChip).join(' ')
        : '<span style="padding:1px 7px;border:1px solid var(--bad);border-radius:5px;background:var(--bad-soft);color:var(--bad);font-family:var(--mono);font-size:10.5px">∅ 無 posting</span>';
      return '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:4px 0 4px 12px">' +
        termChip(t) +
        '<span style="color:var(--text-3);font-family:var(--mono);font-size:11px">→ posting</span>' +
        right + '</div>';
    }).join('');
    var s2 = '<div style="margin-bottom:11px"><div style="font-family:var(--mono);font-size:10.5px;color:var(--text-3);margin-bottom:3px">② 逐 term 查 posting list（docId 集合）</div>' +
      (rows || '<div style="margin-left:12px;color:var(--text-3);font-size:12px">—</div>') + '</div>';

    var matchedIds = combine(sets, matchOp);
    var opLabel = matchOp === 'and' ? 'AND · 交集 ∩' : 'OR · 聯集 ∪';
    var s3right = matchedIds.length
      ? matchedIds.map(idChip).join(' ')
      : '<span style="color:var(--bad);font-size:12px;font-family:var(--mono)">∅ 無命中</span>';
    var s3 = '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-top:10px;border-top:1px dashed var(--border-strong)">' +
      '<span style="font-family:var(--mono);font-size:10.5px;color:var(--text-3);flex:0 0 116px">③ 合併 · ' + opLabel + '</span>' +
      s3right +
      '<span style="color:var(--text-3);font-size:11.5px">→ 送入 BM25 排序</span></div>';

    el.innerHTML = s1 + s2 + s3;
  }

  function renderResults(query) {
    var el = $('demo-results');
    if (!el) return;
    var q = (query || '').trim();
    if (!q) {
      el.innerHTML = '<span style="color:var(--text-3);font-size:13px">輸入查詢後按「搜尋」</span>';
      return;
    }
    var queryTerms = tokenize(q);
    var index = buildIndex(DOCS);
    var sets = queryTerms.map(function (t) { return docIdSet(t, index); });
    var matchedIds = combine(sets, matchOp);

    var hits = DOCS.filter(function (d) {
      return d.visible && matchedIds.indexOf(d.id) !== -1;
    })
      .map(function (doc) {
        return { doc: doc, score: scoreDoc(doc, queryTerms, index, DOCS) };
      })
      .sort(function (a, b) { return b.score - a.score; });

    if (!hits.length) {
      el.innerHTML = '<span style="color:var(--bad);font-size:13px">0 hits · op=' + matchOp.toUpperCase() + ' · terms: [' + queryTerms.join(', ') + ']</span>';
      return;
    }

    el.innerHTML = hits.map(function (h, i) {
      var rank = i + 1;
      var cls = rank === 1 ? 'ns-ok' : 'ns-idle';
      return '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">' +
        '<span style="font-family:var(--mono);font-size:11px;color:var(--text-3);width:20px">#' + rank + '</span>' +
        '<i class="dot ' + cls + '"></i>' +
        '<span style="flex:1"><b>' + h.doc.id + '</b> — ' + h.doc.body.substring(0, 40) + '…</span>' +
        '<span style="font-family:var(--mono);font-size:11px;color:var(--accent)">score ' + h.score.toFixed(2) + '</span>' +
        '</div>';
    }).join('');
  }

  function setStatus(msg) {
    var el = $('demo-status');
    if (el) el.textContent = msg;
  }

  function runSearch() {
    var q = $('search-query') ? $('search-query').value : '';
    var queryTerms = tokenize(q);
    renderIndex();
    renderPipeline(q);
    renderResults(q);
    setStatus('Query terms [' + queryTerms.join(', ') + '] · op=' + matchOp.toUpperCase() + ' · Visible docs=' + DOCS.filter(function (d) { return d.visible; }).length + (pendingDoc ? ' · 1 doc in buffer (未 refresh)' : ''));
  }

  function resetDemo() {
    DOCS = [
      { id: 'doc1', title: 'Doc 1 · 2PC', body: '分散式 交易 使用 兩階段 提交 協調者 一致性', visible: true },
      { id: 'doc2', title: 'Doc 2 · Replication', body: '資料 複寫 主從 架構 最終 一致 延遲', visible: true },
      { id: 'doc3', title: 'Doc 3 · Sharding', body: '資料 分片 雜湊 路由 分散式 擴展', visible: true }
    ];
    pendingDoc = null;
    totalDocs = 3;
    matchOp = 'or';
    document.querySelectorAll('[data-op]').forEach(function (btn) {
      btn.setAttribute('aria-pressed', btn.getAttribute('data-op') === 'or' ? 'true' : 'false');
    });
    if ($('search-query')) $('search-query').value = '分散式 交易';
    renderCorpus();
    renderIndex();
    renderPipeline('分散式 交易');
    renderResults('分散式 交易');
    setStatus('已重置：預設查詢「分散式 交易」、op=OR。試試切到 AND 看命中如何收斂到交集。');
  }

  function bindSeg(selector, attr, onSelect) {
    document.querySelectorAll(selector).forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll(selector).forEach(function (b) {
          b.setAttribute('aria-pressed', 'false');
        });
        btn.setAttribute('aria-pressed', 'true');
        onSelect(btn.getAttribute(attr));
      });
    });
  }

  bindSeg('[data-op]', 'data-op', function (val) {
    matchOp = val;
    setStatus('操作符切換為 ' + val.toUpperCase() + (val === 'and' ? '（posting list 取交集 ∩，須含全部 term）' : '（posting list 取聯集 ∪，含任一 term 即命中）'));
    runSearch();
  });

  if ($('btn-search')) {
    $('btn-search').addEventListener('click', runSearch);
  }
  if ($('search-query')) {
    $('search-query').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') runSearch();
    });
  }

  if ($('btn-index-new')) {
    $('btn-index-new').addEventListener('click', function () {
      if (pendingDoc) {
        setStatus('已有 doc 在 buffer 中，請先 Refresh 或 Reset。');
        return;
      }
      totalDocs += 1;
      pendingDoc = {
        id: 'doc' + totalDocs,
        title: 'Doc ' + totalDocs + ' · New',
        body: '分散式 交易 Saga 模式 補償 最終一致',
        visible: false
      };
      renderCorpus();
      renderIndex();
      setStatus('新 doc 已寫入 memory buffer（' + pendingDoc.id + '），對搜尋不可見。按 Refresh 後再搜「Saga」可找到。');
    });
  }

  if ($('btn-refresh')) {
    $('btn-refresh').addEventListener('click', function () {
      if (!pendingDoc) {
        setStatus('Buffer 為空，無需 Refresh。');
        return;
      }
      pendingDoc.visible = true;
      DOCS.push(pendingDoc);
      var id = pendingDoc.id;
      pendingDoc = null;
      renderCorpus();
      renderIndex();
      runSearch();
      setStatus('Refresh 完成：' + id + ' flush 成新 segment，現在可搜尋。');
    });
  }

  if ($('btn-reset')) {
    $('btn-reset').addEventListener('click', resetDemo);
  }

  resetDemo();
})();
</script>
