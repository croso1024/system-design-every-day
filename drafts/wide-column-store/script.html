<script>
(function () {
  var model = 'inbox';
  var query = 'pk';
  var nodes = ['N1', 'N2', 'N3', 'N4'];
  var runCount = 0;

  var elRing = document.getElementById('wc-ring');
  var elPlan = document.getElementById('wc-plan');
  var elMetrics = document.getElementById('wc-metrics');
  var elStatus = document.getElementById('wc-status');
  var modelBtns = document.querySelectorAll('[data-model]');
  var queryBtns = document.querySelectorAll('[data-query]');

  var scenarios = {
    inbox: {
      label: 'inbox_by_user (PK: user_id, CK: message_id)',
      pk: 'user_id = alice-42',
      range: 'user_id = alice-42 AND message_id > t-100',
      scan: 'WHERE sender = "bob"  — 無 partition key'
    },
    orders: {
      label: 'orders_by_id (PK: order_id)',
      pk: 'order_id = ord-9f3a',
      range: 'order_id = ord-9f3a  — 單列 lookup',
      scan: 'WHERE status = "pending"  — 無 partition key'
    },
    bad: {
      label: 'orders_by_status (PK: status)  ⚠ hot partition',
      pk: 'status = "pending"',
      range: 'status = "pending" AND order_id > x',
      scan: 'SELECT *  — 全表掃描'
    }
  };

  function dot(cls) {
    return '<span style="display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:middle" class="' + cls + '"></span>';
  }

  function hashPartition(key) {
    var h = 0;
    for (var i = 0; i < key.length; i++) h = ((h << 5) - h + key.charCodeAt(i)) | 0;
    return Math.abs(h) % 4;
  }

  function computeRoute() {
    var hit = [];
    var scatter = false;
    var coord = 0;
    var latency = 'low';
    var replicas = 1;
    var plan = [];

    if (query === 'scan' || (model === 'bad' && query !== 'pk')) {
      scatter = true;
      hit = [0, 1, 2, 3];
      coord = 1;
      latency = 'critical';
      replicas = 4;
      plan.push('① Client → Node-' + nodes[coord] + ' (coordinator)');
      plan.push('② Scatter-gather：廣播至全部 4 nodes');
      plan.push('③ 各節點本地掃描 SSTable');
      plan.push('④ Coordinator 合併結果 → 高延遲');
      elStatus.textContent = '危險：無有效 partition key，觸發全叢集 scatter-gather！生產環境應禁止此查詢。';
      return { hit: hit, scatter: scatter, coord: coord, latency: latency, replicas: replicas, plan: plan };
    }

    var pkValue = model === 'inbox' ? 'alice-42' : model === 'orders' ? 'ord-9f3a' : 'pending';
    var partIdx = hashPartition(pkValue);
    hit = [partIdx];
    coord = (partIdx + 1) % 4;
    replicas = 3;
    latency = query === 'range' ? 'low' : 'minimal';

    plan.push('① Client → Node-' + nodes[coord] + ' (coordinator)');
    plan.push('② token(' + pkValue + ') → partition on ' + nodes[partIdx]);
    if (query === 'range' && model === 'inbox') {
      plan.push('③ Partition-local range scan (clustering key)');
      plan.push('④ 回傳排序後前 50 列');
      elStatus.textContent = '理想路徑：partition key 命中單一節點，clustering key 做範圍掃描——Cassandra 最擅長的查詢型態。';
    } else if (model === 'bad') {
      plan.push('③ 命中 Node-' + nodes[partIdx] + ' 但 status 基數極低');
      plan.push('④ 幾乎所有「pending」訂單擠在同一 partition → hot spot');
      latency = 'high';
      elStatus.textContent = 'Hot partition：低基數 partition key 讓大量寫入打到同一節點，P99 延遲飆升。';
    } else {
      plan.push('③ 直接讀取 ' + nodes[partIdx] + ' 上的單列 / 少數 replica');
      plan.push('④ Partition-local point lookup 完成');
      elStatus.textContent = '高效：partition key 精準路由到單一節點，延遲最低。';
    }

    return { hit: hit, scatter: scatter, coord: coord, latency: latency, replicas: replicas, plan: plan };
  }

  function renderIdle() {
    var ring = '';
    nodes.forEach(function (n, i) {
      ring += dot('ns-idle') + 'Node-' + n + '  [token range ' + (i * 25) + '–' + ((i + 1) * 25 - 1) + ']<br>';
    });
    elRing.innerHTML = ring;
    elPlan.innerHTML = '<span style="color:var(--text-3)">等待執行查詢…</span>';
    elMetrics.innerHTML =
      '<span><strong>Model</strong>：' + scenarios[model].label + '</span>' +
      '<span><strong>Query</strong>：' + scenarios[model][query] + '</span>';
  }

  function renderResult(route) {
    var ring = '';
    nodes.forEach(function (n, i) {
      var cls = 'ns-idle';
      if (i === route.coord) cls = 'ns-wait';
      else if (route.hit.indexOf(i) >= 0) cls = route.scatter ? 'ns-bad' : 'ns-ok';
      ring += dot(cls) + 'Node-' + n;
      if (i === route.coord) ring += '  ← coordinator';
      if (route.hit.indexOf(i) >= 0 && i !== route.coord) ring += '  ← replica';
      ring += '<br>';
    });
    elRing.innerHTML = ring;

    var planHtml = '';
    route.plan.forEach(function (line) {
      planHtml += dot('ns-wait') + line + '<br>';
    });
    elPlan.innerHTML = planHtml;

    var latCls = route.latency === 'minimal' ? 'ns-ok' : route.latency === 'low' ? 'ns-ok' : route.latency === 'high' ? 'ns-lock' : 'ns-bad';
    elMetrics.innerHTML =
      '<span><strong>Nodes hit</strong>：' + route.hit.length + ' / 4</span>' +
      '<span><strong>RF contacted</strong>：' + route.replicas + '</span>' +
      '<span><strong>Latency</strong>：' + dot(latCls) + route.latency + '</span>' +
      '<span><strong>Runs</strong>：' + runCount + '</span>';
  }

  function setModel(m) {
    model = m;
    modelBtns.forEach(function (b) {
      b.setAttribute('aria-pressed', b.getAttribute('data-model') === m ? 'true' : 'false');
    });
    renderIdle();
    elStatus.textContent = '已切換模型：' + scenarios[m].label + '。選擇查詢後按「執行查詢」。';
  }

  function setQuery(q) {
    query = q;
    queryBtns.forEach(function (b) {
      b.setAttribute('aria-pressed', b.getAttribute('data-query') === q ? 'true' : 'false');
    });
    renderIdle();
  }

  function runQuery() {
    runCount++;
    var route = computeRoute();
    renderResult(route);
  }

  function reset() {
    runCount = 0;
    renderIdle();
    elStatus.textContent = '已重置。選擇資料模型與查詢模式，按「執行查詢」觀察路由行為。';
  }

  modelBtns.forEach(function (b) {
    b.addEventListener('click', function () { setModel(b.getAttribute('data-model')); });
  });
  queryBtns.forEach(function (b) {
    b.addEventListener('click', function () { setQuery(b.getAttribute('data-query')); });
  });
  document.getElementById('btn-run').addEventListener('click', runQuery);
  document.getElementById('btn-reset').addEventListener('click', reset);

  renderIdle();
})();
</script>
