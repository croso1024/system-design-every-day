        },

        },

          ph: "generate",
          tone: "bad",
          chunks: { c1: "idle", c2: "weak", c3: "miss" },
          scores: { c1: "0.44", c2: "0.58", c3: "0.55" },
          prompt: [

          answer: "（風險）模型可能硬湊：「大約 2–4 天內聯絡客服…」——看起來有引用，事實卻錯。或在嚴格 system 下回答「上下文不足」。",

        }

    norag: {

        },

          tone: "wait",

          scores: { c1: "—", c2: "—", c3: "—" },

          status: "① 無 Embed／Retrieve：沒有外部知識通道。公司退貨政策若未進訓練語料，模型只能猜或拒答。"
        },

        },

          status: "④ Generate：這就是 RAG 要解的痛——幻覺、過時、私有知識。對照「檢索命中」情境即可感受到差距。"
        }
      ]
    }
  };

  function setPhases(activePh, tone) {
    phaseEls.forEach(function (el) {
      var id = el.getAttribute("data-ph");
      el.classList.remove("ph-active", "ph-done", "ph-bad", "ph-lock");
      if (!activePh) return;
      var order = ["embed", "retrieve", "prompt", "generate"];
      var ai = order.indexOf(activePh);
      var ei = order.indexOf(id);
      if (ei < ai) el.classList.add("ph-done");
      if (ei === ai) {
        el.classList.add("ph-active");
        if (tone === "bad") el.classList.add("ph-bad");
        if (tone === "lock") el.classList.add("ph-lock");
      }
    });
  }

  function setChunks(states, scores) {
    Object.keys(chunkEls).forEach(function (id) {
      var el = chunkEls[id];
      if (!el) return;
      el.classList.remove("ch-hit", "ch-weak", "ch-miss", "ch-idle");
      var st = states[id] || "idle";
      el.classList.add("ch-" + st);
      var score = scores[id] != null ? scores[id] : "—";
      var meta = el.querySelector(".ck");
      if (meta) meta.textContent = CHUNK_META[id] + " · score " + score;
    });
  }

  function render() {
    var steps = SCENARIOS[scenario].steps;
    if (stepIdx >= steps.length) stepIdx = steps.length - 1;
    var s = steps[stepIdx];

    if (queryEl) queryEl.textContent = QUERY;
    if (statusEl) statusEl.textContent = s.status;

    promptEl.textContent = s.prompt;
    promptEl.className = "rag-prompt tone-" + (s.tone || "wait");

    answerEl.textContent = s.answer;
    answerEl.className = "rag-answer" + (s.answerTone ? " " + s.answerTone : "");

    setPhases(s.ph, s.tone);
    setChunks(s.chunks, s.scores);

    btnNext.disabled = stepIdx >= steps.length - 1;
  }

  function reset() {
    stepIdx = 0;
    render();
  }

  document.querySelectorAll("#demo-rag-flow .seg button").forEach(function (btn) {
    btn.addEventListener("click", function () {
      document.querySelectorAll("#demo-rag-flow .seg button").forEach(function (b) {
        b.setAttribute("aria-pressed", b === btn ? "true" : "false");
      });
      scenario = btn.getAttribute("data-sc");
      reset();
    });
  });

  btnNext.addEventListener("click", function () {
    var steps = SCENARIOS[scenario].steps;
    if (stepIdx < steps.length - 1) {
      stepIdx += 1;
      render();
    }
  });

  btnReset.addEventListener("click", reset);

  reset();
})();
</script>
