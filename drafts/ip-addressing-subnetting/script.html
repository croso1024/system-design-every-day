<script>
(function () {
  "use strict";

  function parseIPv4(str) {
    var parts = str.trim().split(".");
    if (parts.length !== 4) return null;
    var n = 0;
    for (var i = 0; i < 4; i++) {
      var p = parseInt(parts[i], 10);
      if (isNaN(p) || p < 0 || p > 255) return null;
      n = (n << 8) | p;
    }
    return n >>> 0;
  }

  function intToIPv4(n) {
    return [
      (n >>> 24) & 255,
      (n >>> 16) & 255,
      (n >>> 8) & 255,
      n & 255
    ].join(".");
  }

  function parseMask(str) {
    str = str.trim();
    if (str.charAt(0) === "/") {
      var prefix = parseInt(str.slice(1), 10);
      if (isNaN(prefix) || prefix < 0 || prefix > 32) return null;
      if (prefix === 0) return 0;
      return (0xFFFFFFFF << (32 - prefix)) >>> 0;
    }
    var m = parseIPv4(str);
    if (m === null) return null;
    var inv = (~m) >>> 0;
    if ((inv & ((inv + 1) >>> 0)) !== 0) return null;
    return m;
  }

  function maskToPrefix(mask) {
    var bits = 0;
    for (var i = 31; i >= 0; i--) {
      if (mask & (1 << i)) bits++;
      else break;
    }
    return bits;
  }

  function maskToDotted(mask) {
    return intToIPv4(mask);
  }

  function calcSubnet(ip, mask) {
    var network = (ip & mask) >>> 0;
    var wildcard = (~mask) >>> 0;
    var broadcast = (network | wildcard) >>> 0;
    var prefix = maskToPrefix(mask);
    var hostBits = 32 - prefix;
    var total = hostBits >= 31 ? Math.pow(2, hostBits) : Math.pow(2, hostBits);
    var usable = hostBits === 0 ? 1 : (hostBits >= 31 ? total : total - 2);
    var first = hostBits === 0 ? network : network + 1;
    var last = hostBits === 0 ? network : broadcast - 1;
    if (hostBits >= 31) {
      first = network;
      last = broadcast;
      usable = total;
    }
    return {
      network: network,
      broadcast: broadcast,
      first: first,
      last: last,
      usable: usable,
      prefix: prefix,
      hostBits: hostBits,
      isNetwork: ip === network,
      isBroadcast: ip === broadcast,
      isUsable: ip > network && ip < broadcast
    };
  }

  var PRESETS = {
    home: { ip: "192.168.1.10", mask: "/24" },
    dc26: { ip: "10.20.30.15", mask: "/26" },
    point: { ip: "10.0.0.1", mask: "/30" }
  };

  function setText(id, text, cls) {
    var el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.className = cls || "";
  }

  function runCalc() {
    var ipStr = document.getElementById("sub-ip").value;
    var maskStr = document.getElementById("sub-mask").value;
    var status = document.getElementById("sub-status");

    var ip = parseIPv4(ipStr);
    var mask = parseMask(maskStr);

    if (ip === null) {
      status.textContent = "IP 格式錯誤。請輸入如 192.168.1.10";
      status.className = "status-line ns-bad";
      return;
    }
    if (mask === null) {
      status.textContent = "遮罩格式錯誤。請輸入 255.255.255.0 或 /24";
      status.className = "status-line ns-bad";
      return;
    }

    var s = calcSubnet(ip, mask);
    setText("r-network", intToIPv4(s.network), "hl");
    setText("r-broadcast", intToIPv4(s.broadcast));
    setText("r-first", intToIPv4(s.first));
    setText("r-last", intToIPv4(s.last));
    setText("r-hosts", String(s.usable));
    setText("r-cidr", intToIPv4(s.network) + "/" + s.prefix + "  (mask " + maskToDotted(mask) + ")");

    var gwExample = intToIPv4(s.first);
    var sameNote = "";
    if (s.isNetwork) {
      sameNote = "⚠ 目前 IP 是網路位址，不可配給主機";
      status.className = "status-line ns-lock";
    } else if (s.isBroadcast) {
      sameNote = "⚠ 目前 IP 是廣播位址，不可配給主機";
      status.className = "status-line ns-lock";
    } else {
      sameNote = "✓ 合法主機位址。建議 Gateway：" + gwExample;
      status.className = "status-line ns-ok";
    }
    setText("r-same", sameNote);

    status.textContent = "計算完成：" + ipStr + "/" + s.prefix + " → 網段 " + intToIPv4(s.network) + "，可用主機 " + s.usable + " 個。";
  }

  function resetDemo() {
    document.getElementById("sub-ip").value = "192.168.1.10";
    document.getElementById("sub-mask").value = "/24";
    var btns = document.querySelectorAll("#demo-subnet .seg button");
    btns.forEach(function (b) { b.setAttribute("aria-pressed", "false"); });
    runCalc();
  }

  document.addEventListener("DOMContentLoaded", function () {
    var ipInput = document.getElementById("sub-ip");
    var maskInput = document.getElementById("sub-mask");

    if (!ipInput) return;

    ipInput.addEventListener("input", runCalc);
    maskInput.addEventListener("input", runCalc);

    document.getElementById("sub-calc").addEventListener("click", runCalc);
    document.getElementById("sub-reset").addEventListener("click", resetDemo);

    document.querySelectorAll("#demo-subnet .seg button").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var key = btn.getAttribute("data-preset");
        var p = PRESETS[key];
        if (!p) return;
        document.getElementById("sub-ip").value = p.ip;
        document.getElementById("sub-mask").value = p.mask;
        document.querySelectorAll("#demo-subnet .seg button").forEach(function (b) {
          b.setAttribute("aria-pressed", b === btn ? "true" : "false");
        });
        runCalc();
      });
    });

    runCalc();
  });
})();
</script>
