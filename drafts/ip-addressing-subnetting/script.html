<script>
(function () {
  "use strict";

  function parseIPv4(str) {
    if (!str || !String(str).trim()) return null;
    var parts = String(str).trim().split(".");
    if (parts.length !== 4) return null;
    var n = 0;
    for (var i = 0; i < 4; i++) {
      if (!/^\d+$/.test(parts[i])) return null;
      var p = parseInt(parts[i], 10);
      if (isNaN(p) || p < 0 || p > 255) return null;
      n = (n << 8) | p;
    }
    return n >>> 0;
  }

  function intToIPv4(n) {
    return [
      (n >>> 24) & 255,
      (n >>> 16) & 255,
      (n >>> 8) & 255,
      n & 255
    ].join(".");
  }

  function parseMask(str) {
    if (str == null) return null;
    str = String(str).trim();
    if (!str) return null;
    if (str.charAt(0) === "/") {
      var prefix = parseInt(str.slice(1), 10);
      if (isNaN(prefix) || prefix < 0 || prefix > 32) return null;
      if (prefix === 0) return 0;
      return (0xffffffff << (32 - prefix)) >>> 0;
    }
    var m = parseIPv4(str);
    if (m === null) return null;
    var inv = (~m) >>> 0;
    if ((inv & ((inv + 1) >>> 0)) !== 0) return null;
    return m;
  }

  function maskToPrefix(mask) {
    var bits = 0;
    var foundZero = false;
    for (var i = 31; i >= 0; i--) {
      if (mask & (1 << i)) {
        if (foundZero) return -1;
        bits++;
      } else {
        foundZero = true;
      }
    }
    return bits;
  }

  function calcSubnet(ip, mask) {
    var network = (ip & mask) >>> 0;
    var wildcard = (~mask) >>> 0;
    var broadcast = (network | wildcard) >>> 0;
    var prefix = maskToPrefix(mask);
    var hostBits = 32 - prefix;
    var total = Math.pow(2, hostBits);
    var first;
    var last;
    var usable;
    var special = false;

    if (prefix === 32) {
      first = network;
      last = network;
      usable = 1;
      special = true;
    } else if (prefix === 31) {
      first = network;
      last = broadcast;
      usable = 2;
      special = true;
    } else {
      first = network + 1;
      last = broadcast - 1;
      usable = total - 2;
    }

    var isNetwork = !special && ip === network;
    var isBroadcast = !special && ip === broadcast;
    var isUsable = special
      ? ip >= first && ip <= last
      : ip > network && ip < broadcast;

    return {
      network: network,
      broadcast: broadcast,
      first: first,
      last: last,
      usable: usable,
      prefix: prefix,
      hostBits: hostBits,
      special: special,
      isNetwork: isNetwork,
      isBroadcast: isBroadcast,
      isUsable: isUsable
    };
  }

  var PRESETS = {
    home: {
      ip: "192.168.1.10",
      mask: "/24",
      ipB: "192.168.1.200",
      maskB: "",
      note: "家用典型 /24：A 與 B 同網段。"
    },
    split: {
      ip: "192.168.1.10",
      mask: "/25",
      ipB: "192.168.1.200",
      maskB: "",
      note: "同一對 IP、同一條 /25：.10 與 .200 分屬不同半區（標準題）。"
    },
    dc26: {
      ip: "10.20.30.80",
      mask: "/26",
      ipB: "10.20.30.65",
      maskB: "",
      note: "機房 DB 網段 10.20.30.64/26：.80 為主機，.65 常作 Gateway；可用 .65–.126。"
    },
    point: {
      ip: "10.0.0.1",
      mask: "/30",
      ipB: "10.0.0.2",
      maskB: "",
      note: "點對點 /30：剛好 2 個可用主機（兩台設備互連）。"
    }
  };

  function setText(id, text, cls) {
    var el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.className = cls || "";
  }

  function setHtml(id, html, cls) {
    var el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = html;
    el.className = cls || "";
  }

  function renderBits(ip, prefix) {
    var host = document.getElementById("sub-bits");
    if (!host) return;
    host.innerHTML = "";
    for (var i = 31; i >= 0; i--) {
      var bitIndex = 31 - i;
      var bit = (ip >>> i) & 1;
      var span = document.createElement("span");
      span.className = "ip-bit " + (bitIndex < prefix ? "net" : "host");
      span.textContent = String(bit);
      span.title = "bit " + bitIndex + (bitIndex < prefix ? " (網路)" : " (主機)");
      host.appendChild(span);
      if (bitIndex % 8 === 7 && bitIndex !== 31) {
        var sep = document.createElement("span");
        sep.className = "ip-bit sep";
        sep.textContent = ".";
        host.appendChild(sep);
      }
    }
  }

  function clearResults() {
    ["r-network", "r-broadcast", "r-first", "r-last", "r-hosts", "r-cidr", "r-validity", "r-same"].forEach(function (id) {
      setText(id, "—");
    });
    var bits = document.getElementById("sub-bits");
    if (bits) bits.innerHTML = "";
  }

  function viewLabel(selfIp, peerIp, mask) {
    var selfNet = (selfIp & mask) >>> 0;
    var peerNet = (peerIp & mask) >>> 0;
    return {
      net: selfNet,
      same: selfNet === peerNet
    };
  }

  function runCalc() {
    var ipStr = document.getElementById("sub-ip").value;
    var maskStr = document.getElementById("sub-mask").value;
    var ipBStr = document.getElementById("sub-ip-b").value;
    var maskBStr = document.getElementById("sub-mask-b").value;
    var status = document.getElementById("sub-status");

    var ip = parseIPv4(ipStr);
    var mask = parseMask(maskStr);

    if (ip === null) {
      clearResults();
      status.textContent = "主機 IP（A）格式錯誤。請輸入如 192.168.1.10";
      status.className = "status-line ns-bad";
      return;
    }
    if (mask === null) {
      clearResults();
      status.textContent = "遮罩格式錯誤。請輸入 255.255.255.0 或 /24";
      status.className = "status-line ns-bad";
      return;
    }

    var s = calcSubnet(ip, mask);
    renderBits(ip, s.prefix);

    setText("r-network", intToIPv4(s.network), "hl");
    setText("r-broadcast", intToIPv4(s.broadcast));
    setText("r-first", intToIPv4(s.first));
    setText("r-last", intToIPv4(s.last));
    setText(
      "r-hosts",
      String(s.usable) + (s.special ? "（/31 或 /32 特例）" : "")
    );
    setText(
      "r-cidr",
      intToIPv4(s.network) + "/" + s.prefix + "  (mask " + intToIPv4(mask) + ")"
    );

    var statusCls = "ns-ok";
    if (s.isNetwork) {
      setText("r-validity", "網路位址 — 不可配給主機", "ns-lock");
      statusCls = "ns-lock";
    } else if (s.isBroadcast) {
      setText("r-validity", "廣播位址 — 不可配給主機", "ns-lock");
      statusCls = "ns-lock";
    } else if (s.isUsable) {
      setText(
        "r-validity",
        "合法主機位址。第一個可用位址（常被用作 Gateway 慣例，非必須）：" +
          intToIPv4(s.first),
        "ns-ok"
      );
    } else {
      setText("r-validity", "不在可用範圍", "ns-bad");
      statusCls = "ns-bad";
    }

    var bTrim = (ipBStr || "").trim();
    if (!bTrim) {
      setText("r-same", "未輸入 B — 略過同網段比較");
    } else {
      var ipB = parseIPv4(bTrim);
      if (ipB === null) {
        setHtml("r-same", '<span class="ip-same-err">B 的 IP 格式錯誤</span>', "ns-bad");
        statusCls = "ns-bad";
      } else {
        var maskBRaw = (maskBStr || "").trim();
        var maskB = maskBRaw ? parseMask(maskBRaw) : mask;
        if (maskB === null) {
          setHtml("r-same", '<span class="ip-same-err">B 的遮罩格式錯誤</span>', "ns-bad");
          statusCls = "ns-bad";
        } else if (!maskBRaw || maskB === mask) {
          // 標準題：同一遮罩
          var netA = (ip & mask) >>> 0;
          var netB = (ipB & mask) >>> 0;
          if (netA === netB) {
            setHtml(
              "r-same",
              '<span class="ip-same-ok">同網段</span>（標準題・同一遮罩）— ' +
                intToIPv4(netA) +
                "/" +
                s.prefix,
              "ns-ok"
            );
          } else {
            setHtml(
              "r-same",
              '<span class="ip-same-no">不同網段</span>（標準題・同一遮罩）— A:' +
                intToIPv4(netA) +
                "/" +
                s.prefix +
                "，B:" +
                intToIPv4(netB) +
                "/" +
                s.prefix,
              "ns-wait"
            );
            if (statusCls === "ns-ok") statusCls = "ns-wait";
          }
        } else {
          // 誤設定實驗：各自用自己的遮罩看對方
          var aView = viewLabel(ip, ipB, mask);
          var bView = viewLabel(ipB, ip, maskB);
          var prefB = maskToPrefix(maskB);
          var aTxt = aView.same ? "同網段" : "不同網段";
          var bTxt = bView.same ? "同網段" : "不同網段";
          setHtml(
            "r-same",
            "誤設定實驗 — <b>A 視角</b>（用 A 的遮罩看 B）：" +
              aTxt +
              "；<b>B 視角</b>（用 B 的遮罩看 A）：" +
              bTxt +
              "。<br>A 網段 " +
              intToIPv4(aView.net) +
              "/" +
              s.prefix +
              "，B 網段 " +
              intToIPv4(bView.net) +
              "/" +
              prefB,
            aView.same && bView.same ? "ns-ok" : "ns-lock"
          );
          if (!(aView.same && bView.same) && statusCls === "ns-ok") {
            statusCls = "ns-lock";
          }
          status.className = "status-line " + statusCls;
          status.textContent =
            "目前為誤設定實驗（非標準題）：兩端遮罩不同，分別用各自遮罩判斷。" +
            " A=" +
            ipStr.trim() +
            "/" +
            s.prefix +
            "，可用主機 " +
            s.usable +
            " 個。";
          return;
        }
      }
    }

    status.className = "status-line " + statusCls;
    status.textContent =
      "計算完成：" +
      ipStr.trim() +
      "/" +
      s.prefix +
      " → 網段 " +
      intToIPv4(s.network) +
      "，可用主機 " +
      s.usable +
      " 個。";
  }

  function applyPreset(key) {
    var p = PRESETS[key];
    if (!p) return;
    document.getElementById("sub-ip").value = p.ip;
    document.getElementById("sub-mask").value = p.mask;
    document.getElementById("sub-ip-b").value = p.ipB;
    document.getElementById("sub-mask-b").value = p.maskB;
    document.querySelectorAll("#demo-subnet .seg button").forEach(function (b) {
      b.setAttribute(
        "aria-pressed",
        b.getAttribute("data-preset") === key ? "true" : "false"
      );
    });
    runCalc();
    var status = document.getElementById("sub-status");
    if (status && p.note) {
      status.textContent = p.note + " " + status.textContent;
    }
  }

  function resetDemo() {
    applyPreset("home");
  }

  document.addEventListener("DOMContentLoaded", function () {
    var ipInput = document.getElementById("sub-ip");
    if (!ipInput) return;

    ["sub-ip", "sub-mask", "sub-ip-b", "sub-mask-b"].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener("input", runCalc);
    });

    document.getElementById("sub-calc").addEventListener("click", runCalc);
    document.getElementById("sub-reset").addEventListener("click", resetDemo);

    document.querySelectorAll("#demo-subnet .seg button").forEach(function (btn) {
      btn.addEventListener("click", function () {
        applyPreset(btn.getAttribute("data-preset"));
      });
    });

    applyPreset("home");
  });
})();
</script>
