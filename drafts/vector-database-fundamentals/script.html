<script>
(function () {
  'use strict';

  var demo = document.getElementById('demo-ann');
  if (!demo) return;

  var K = 5;
  var NUM_POINTS = 120;
  var IVF_LIST = 8;
  var HNSW_M = 10;          // 本地鄰近度：太小會讓圖困在單一 cluster
  var HNSW_LONG_RANGE = 2;  // 每點額外連到較遠樣本，模擬多層入口的「跳接」
  var HNSW_ENTRY_SAMPLE = 24;
  var HNSW_DEFAULT_EF = 16; // 切到 HNSW 時的教學起點：可見漏檢，但不至於 0%
  var COST_PER_CMP_MS = 0.045;

  var canvas = demo.querySelector('#ann-canvas');
  var ctx = canvas ? canvas.getContext('2d') : null;

  var points = [];
  var query = { x: 0.55, y: 0.42 };
  var indexType = 'brute';
  var param = 8;
  var ivfCentroids = [];
  var ivfAssignments = [];
  var hnswEdges = [];

  var elTrace = demo.querySelector('#ann-trace');
  var elGt = demo.querySelector('#ann-gt');
  var elResult = demo.querySelector('#ann-result');
  var elMetrics = demo.querySelector('#ann-metrics');
  var elStatus = demo.querySelector('#ann-status');
  var elParam = demo.querySelector('#ann-param');
  var elParamVal = demo.querySelector('#ann-param-val');
  var elParamLabel = demo.querySelector('#ann-param-label');
  var idxBtns = demo.querySelectorAll('[data-idx]');

  function dist(a, b) {
    var dx = a.x - b.x;
    var dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function distSq(a, b) {
    var dx = a.x - b.x;
    var dy = a.y - b.y;
    return dx * dx + dy * dy;
  }

  function seededRand(seed) {
    var s = seed % 2147483647;
    if (s <= 0) s += 2147483646;
    return function () {
      s = (s * 16807) % 2147483647;
      return (s - 1) / 2147483646;
    };
  }

  function genPoints() {
    var rnd = seededRand(42);
    points = [];
    var i;
    // Three soft clusters + some noise → IVF story is visible
    var centers = [
      { x: 0.28, y: 0.30 },
      { x: 0.72, y: 0.28 },
      { x: 0.50, y: 0.72 }
    ];
    for (i = 0; i < NUM_POINTS; i++) {
      if (i < 90) {
        var c = centers[i % 3];
        points.push({
          id: 'v' + (i + 1),
          x: Math.min(0.95, Math.max(0.05, c.x + (rnd() - 0.5) * 0.28)),
          y: Math.min(0.95, Math.max(0.05, c.y + (rnd() - 0.5) * 0.28))
        });
      } else {
        points.push({
          id: 'v' + (i + 1),
          x: 0.05 + rnd() * 0.9,
          y: 0.05 + rnd() * 0.9
        });
      }
    }
  }

  function buildIVF() {
    var rnd = seededRand(7);
    ivfCentroids = [];
    var c;
    for (c = 0; c < IVF_LIST; c++) {
      ivfCentroids.push({
        x: 0.12 + rnd() * 0.76,
        y: 0.12 + rnd() * 0.76
      });
    }
    var iter, p, best, bestD, ci, d, sums, counts, u;
    for (iter = 0; iter < 15; iter++) {
      sums = [];
      counts = [];
      for (u = 0; u < IVF_LIST; u++) {
        sums.push({ x: 0, y: 0 });
        counts.push(0);
      }
      for (p = 0; p < points.length; p++) {
        best = 0;
        bestD = Infinity;
        for (ci = 0; ci < IVF_LIST; ci++) {
          d = distSq(points[p], ivfCentroids[ci]);
          if (d < bestD) { bestD = d; best = ci; }
        }
        sums[best].x += points[p].x;
        sums[best].y += points[p].y;
        counts[best]++;
      }
      for (u = 0; u < IVF_LIST; u++) {
        if (counts[u] > 0) {
          ivfCentroids[u].x = sums[u].x / counts[u];
          ivfCentroids[u].y = sums[u].y / counts[u];
        }
      }
    }
    ivfAssignments = points.map(function (pt) {
      best = 0;
      bestD = Infinity;
      for (ci = 0; ci < IVF_LIST; ci++) {
        d = distSq(pt, ivfCentroids[ci]);
        if (d < bestD) { bestD = d; best = ci; }
      }
      return best;
    });
  }

  function linkUndirected(i, j) {
    if (i === j) return;
    if (hnswEdges[i].indexOf(j) < 0) hnswEdges[i].push(j);
    if (hnswEdges[j].indexOf(i) < 0) hnswEdges[j].push(i);
  }

  function buildHNSW() {
    // Undirected kNN graph + sparse long-range edges (simplified single-layer HNSW-like).
    // Long-range links stand in for upper-layer shortcuts so the demo can leave a wrong cluster.
    hnswEdges = points.map(function () { return []; });
    var i, j, list, a, b, step, far;
    for (i = 0; i < points.length; i++) {
      list = [];
      for (j = 0; j < points.length; j++) {
        if (i === j) continue;
        list.push({ j: j, d: dist(points[i], points[j]) });
      }
      list.sort(function (x, y) { return x.d - y.d; });
      for (a = 0; a < HNSW_M && a < list.length; a++) {
        linkUndirected(i, list[a].j);
      }
      // Connect toward the far end of the sorted list (cross-cluster shortcuts)
      for (a = 0; a < HNSW_LONG_RANGE; a++) {
        far = list.length - 1 - a * 7;
        if (far <= HNSW_M) break;
        linkUndirected(i, list[far].j);
      }
    }
    // Deterministic ring of hubs across the three soft clusters → guarantees an escape path
    step = 3;
    for (i = 0; i < 90; i += step) {
      b = (i + step) % 90;
      linkUndirected(i, b);
    }
  }

  function bruteForce(q) {
    var cmp = 0;
    var scored = points.map(function (p) {
      cmp++;
      return { p: p, d: dist(p, q) };
    });
    scored.sort(function (a, b) { return a.d - b.d; });
    return {
      top: scored.slice(0, K).map(function (r) { return r.p; }),
      comparisons: cmp,
      visited: points.map(function (_, i) { return i; }),
      probedClusters: null,
      steps: ['Flat：對全部 ' + points.length + ' 點各算一次距離', '比較次數 = ' + cmp + '（精確，無剪枝）']
    };
  }

  function ivfSearch(q, nprobe) {
    var cmp = 0;
    var ranked = ivfCentroids.map(function (c, i) {
      cmp++;
      return { idx: i, d: dist(c, q) };
    }).sort(function (a, b) { return a.d - b.d; });

    var probeCount = Math.max(1, Math.min(nprobe, IVF_LIST));
    var probeSet = {};
    var probed = [];
    var i;
    for (i = 0; i < probeCount; i++) {
      probeSet[ranked[i].idx] = true;
      probed.push(ranked[i].idx);
    }

    var candidates = [];
    var visited = [];
    points.forEach(function (p, idx) {
      if (probeSet[ivfAssignments[idx]]) {
        candidates.push(p);
        visited.push(idx);
      }
    });

    var scored = candidates.map(function (p) {
      cmp++;
      return { p: p, d: dist(p, q) };
    });
    scored.sort(function (a, b) { return a.d - b.d; });

    var steps = [
      'IVF：先算 query 到 ' + IVF_LIST + ' 個 centroid 的距離',
      'nprobe=' + probeCount + ' → 探 cluster ' + probed.map(function (x) { return 'C' + x; }).join(', '),
      '只在這些桶內的 ' + candidates.length + ' 點上算距離（其餘 ' + (points.length - candidates.length) + ' 點直接跳過）',
      '總比較次數 = ' + cmp + '（含 centroid）'
    ];

    return {
      top: scored.slice(0, K).map(function (r) { return r.p; }),
      comparisons: cmp,
      visited: visited,
      probedClusters: probed,
      steps: steps
    };
  }

  function hnswSearch(q, ef) {
    var cmp = 0;
    // Entry: closest among a stratified sample (stand-in for upper-layer greedy search)
    var entryIdx = 0;
    var bestD = dist(points[0], q);
    cmp++;
    var i, d, sampleStep;
    sampleStep = Math.max(1, Math.floor(points.length / HNSW_ENTRY_SAMPLE));
    for (i = sampleStep; i < points.length; i += sampleStep) {
      d = dist(points[i], q);
      cmp++;
      if (d < bestD) { bestD = d; entryIdx = i; }
    }

    var visited = {};
    visited[entryIdx] = true;
    var visitedList = [entryIdx];
    var candidates = [{ idx: entryIdx, d: bestD }];
    var results = [{ idx: entryIdx, d: bestD }];
    var expansions = 0;
    var maxExpansions = Math.max(ef * 3, ef + 8);

    while (candidates.length && expansions < maxExpansions) {
      candidates.sort(function (a, b) { return a.d - b.d; });
      var curr = candidates.shift();
      // Stop if current is farther than worst in result and result is full (classic beam prune)
      results.sort(function (a, b) { return a.d - b.d; });
      if (results.length >= ef && curr.d > results[results.length - 1].d) break;

      expansions++;
      var neighbors = hnswEdges[curr.idx];
      neighbors.forEach(function (nIdx) {
        if (visited[nIdx]) return;
        visited[nIdx] = true;
        visitedList.push(nIdx);
        var nd = dist(points[nIdx], q);
        cmp++;
        if (results.length < ef || nd < results[results.length - 1].d) {
          candidates.push({ idx: nIdx, d: nd });
          results.push({ idx: nIdx, d: nd });
          results.sort(function (a, b) { return a.d - b.d; });
          if (results.length > ef) results = results.slice(0, ef);
        }
      });
    }

    results.sort(function (a, b) { return a.d - b.d; });
    var top = results.slice(0, K).map(function (r) { return points[r.idx]; });

    var steps = [
      'HNSW（簡化單層 + 少量跳接邊）：每點約 ' + HNSW_M + ' 條近鄰 + 跨區捷徑',
      '入口點 ≈ ' + points[entryIdx].id + '（從分散樣本中選最近，模擬上層粗定位）',
      'ef=' + ef + '：候選隊列寬度；沿圖邊擴張 ' + expansions + ' 步',
      '實際訪問 ' + visitedList.length + ' 點 / ' + points.length + '，比較次數 = ' + cmp,
      '未訪問的點不會被算距離——這才是「近似」的來源'
    ];

    return {
      top: top,
      comparisons: cmp,
      visited: visitedList,
      probedClusters: null,
      steps: steps
    };
  }

  function recallAtK(ann, gt) {
    var gtIds = {};
    gt.forEach(function (p) { gtIds[p.id] = true; });
    var hit = 0;
    ann.forEach(function (p) { if (gtIds[p.id]) hit++; });
    return hit / K;
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function runQuery() {
    var gtPack = bruteForce(query);
    var gt = gtPack.top;
    var pack;

    if (indexType === 'brute') {
      pack = gtPack;
    } else if (indexType === 'ivf') {
      pack = ivfSearch(query, param);
    } else {
      pack = hnswSearch(query, param);
    }

    var rec = recallAtK(pack.top, gt);
    var latency = pack.comparisons * COST_PER_CMP_MS;

    renderCanvas(gt, pack);
    renderLists(gt, pack.top, rec, latency, pack.comparisons);
    renderTrace(pack);
    elStatus.textContent =
      indexType.toUpperCase() +
      ' · param=' + (indexType === 'brute' ? '—' : param) +
      ' · recall@' + K + '=' + (rec * 100).toFixed(0) + '%' +
      ' · comparisons=' + pack.comparisons +
      ' · latency≈' + latency.toFixed(1) + 'ms（由比較次數推估）';
  }

  function renderTrace(pack) {
    if (!elTrace) return;
    elTrace.innerHTML = pack.steps.map(function (line) {
      return '<div>' + escapeHtml(line) + '</div>';
    }).join('');
  }

  function renderLists(gt, ann, rec, latency, cmp) {
    var annIds = {};
    ann.forEach(function (p) { annIds[p.id] = true; });

    elGt.innerHTML = gt.map(function (p, i) {
      var hit = annIds[p.id];
      var color = hit ? 'var(--ok)' : 'var(--warn)';
      return '<div style="color:' + color + '">#' + (i + 1) + ' ' + p.id +
        (hit ? '' : ' · MISS') +
        ' · d=' + dist(p, query).toFixed(3) + '</div>';
    }).join('');

    elResult.innerHTML = ann.map(function (p, i) {
      var inGt = gt.some(function (g) { return g.id === p.id; });
      var color = inGt ? 'var(--ok)' : 'var(--bad)';
      return '<div style="color:' + color + '">#' + (i + 1) + ' ' + p.id +
        (inGt ? '' : ' · 誤報') +
        ' · d=' + dist(p, query).toFixed(3) + '</div>';
    }).join('');

    var recPct = (rec * 100).toFixed(0);
    var recCls = rec >= 0.95 ? 'var(--ok)' : rec >= 0.6 ? 'var(--warn)' : 'var(--bad)';
    elMetrics.innerHTML =
      '<div><strong>Recall@' + K + '</strong>：<span style="color:' + recCls + ';font-weight:600">' + recPct + '%</span></div>' +
      '<div><strong>Distance comparisons</strong>：' + cmp + '</div>' +
      '<div><strong>Latency (est.)</strong>：' + latency.toFixed(1) + ' ms</div>' +
      '<div><strong>Index</strong>：' + indexType.toUpperCase() + '</div>' +
      '<div><strong>Param</strong>：' + (indexType === 'brute' ? '—' : param + (indexType === 'hnsw' ? ' (ef)' : ' (nprobe)')) + '</div>';
  }

  function renderCanvas(gt, pack) {
    if (!ctx || !canvas) return;
    var w = canvas.width;
    var h = canvas.height;
    var pad = 28;
    var visitedSet = {};
    (pack.visited || []).forEach(function (i) { visitedSet[i] = true; });

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);

    // grid
    ctx.strokeStyle = '#ecebe8';
    ctx.lineWidth = 1;
    var g;
    for (g = 0; g <= 8; g++) {
      var gx = pad + (w - 2 * pad) * g / 8;
      var gy = pad + (h - 2 * pad) * g / 8;
      ctx.beginPath();
      ctx.moveTo(gx, pad);
      ctx.lineTo(gx, h - pad);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pad, gy);
      ctx.lineTo(w - pad, gy);
      ctx.stroke();
    }

    function toXY(p) {
      return {
        x: pad + p.x * (w - 2 * pad),
        y: pad + p.y * (h - 2 * pad)
      };
    }

    // IVF centroids + probe highlight
    if (indexType === 'ivf') {
      var probeSet = {};
      (pack.probedClusters || []).forEach(function (id) { probeSet[id] = true; });
      ivfCentroids.forEach(function (c, i) {
        var xy = toXY(c);
        ctx.beginPath();
        ctx.arc(xy.x, xy.y, probeSet[i] ? 36 : 22, 0, Math.PI * 2);
        ctx.strokeStyle = probeSet[i] ? '#3f6188' : '#cdd9e6';
        ctx.lineWidth = probeSet[i] ? 2 : 1;
        ctx.setLineDash(probeSet[i] ? [] : [4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = probeSet[i] ? '#3f6188' : '#9aa0a8';
        ctx.font = '10px JetBrains Mono, monospace';
        ctx.fillText('C' + i, xy.x - 8, xy.y + 3);
      });
    }

    // HNSW edges (faint), emphasize visited edges
    if (indexType === 'hnsw') {
      var i, ni, a, b, nIdx;
      ctx.lineWidth = 1;
      for (i = 0; i < points.length; i++) {
        for (ni = 0; ni < hnswEdges[i].length; ni++) {
          nIdx = hnswEdges[i][ni];
          if (nIdx < i) continue;
          a = toXY(points[i]);
          b = toXY(points[nIdx]);
          var hot = visitedSet[i] && visitedSet[nIdx];
          ctx.strokeStyle = hot ? 'rgba(63,97,136,0.35)' : 'rgba(222,220,216,0.7)';
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    var gtIds = {};
    gt.forEach(function (p) { gtIds[p.id] = true; });
    var annIds = {};
    pack.top.forEach(function (p) { annIds[p.id] = true; });

    points.forEach(function (p, idx) {
      var xy = toXY(p);
      var isHit = annIds[p.id] && gtIds[p.id];
      var isFalse = annIds[p.id] && !gtIds[p.id];
      var isMiss = gtIds[p.id] && !annIds[p.id];
      var dim = indexType !== 'brute' && !visitedSet[idx];

      ctx.beginPath();
      ctx.arc(xy.x, xy.y, isHit || isFalse || isMiss ? 5.5 : 3, 0, Math.PI * 2);
      if (isHit) ctx.fillStyle = '#4d7d68';
      else if (isFalse) ctx.fillStyle = '#a8554f';
      else if (isMiss) ctx.fillStyle = '#a3743e';
      else ctx.fillStyle = dim ? '#ecebe8' : '#dedcd8';
      ctx.globalAlpha = dim && !isMiss ? 0.45 : 1;
      ctx.fill();
      ctx.globalAlpha = 1;

      if (isMiss) {
        ctx.beginPath();
        ctx.arc(xy.x, xy.y, 8, 0, Math.PI * 2);
        ctx.strokeStyle = '#a3743e';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    });

    var qxy = toXY(query);
    ctx.fillStyle = '#3f6188';
    ctx.beginPath();
    ctx.moveTo(qxy.x, qxy.y - 10);
    ctx.lineTo(qxy.x + 8, qxy.y + 6);
    ctx.lineTo(qxy.x - 8, qxy.y + 6);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#6b7078';
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.fillText('QUERY', qxy.x + 10, qxy.y - 4);
  }

  function syncParamUI() {
    if (indexType === 'brute') {
      elParam.disabled = true;
      elParamLabel.textContent = 'param';
      elParamVal.textContent = '—';
    } else if (indexType === 'ivf') {
      elParam.disabled = false;
      elParam.min = '1';
      elParam.max = String(IVF_LIST);
      if (param > IVF_LIST) param = IVF_LIST;
      if (param < 1) param = 1;
      elParam.value = String(param);
      elParamLabel.textContent = 'nprobe';
      elParamVal.textContent = String(param);
    } else {
      elParam.disabled = false;
      elParam.min = '2';
      elParam.max = '40';
      if (param < 2) param = 2;
      elParam.value = String(param);
      elParamLabel.textContent = 'ef';
      elParamVal.textContent = String(param);
    }
  }

  function setIndex(type) {
    var prev = indexType;
    indexType = type;
    idxBtns.forEach(function (b) {
      b.setAttribute('aria-pressed', b.getAttribute('data-idx') === type ? 'true' : 'false');
    });
    if (type === 'ivf') {
      // Coming from HNSW (ef 可到 40) 時，收斂到可觀察漏檢的 nprobe
      if (prev !== 'ivf' || param > IVF_LIST) param = Math.min(3, IVF_LIST);
    } else if (type === 'hnsw') {
      // 避免沿用 IVF 的 nprobe=1～3 或 Flat 的殘值，直接落到教學起點
      if (prev !== 'hnsw' || param < 2 || param > 40) param = HNSW_DEFAULT_EF;
      if (param < 2) param = HNSW_DEFAULT_EF;
    }
    syncParamUI();
    runQuery();
  }

  function resetDemo() {
    genPoints();
    buildIVF();
    buildHNSW();
    query = { x: 0.55, y: 0.42 };
    indexType = 'brute';
    param = HNSW_DEFAULT_EF;
    idxBtns.forEach(function (b) {
      b.setAttribute('aria-pressed', b.getAttribute('data-idx') === 'brute' ? 'true' : 'false');
    });
    syncParamUI();
    runQuery();
    elStatus.textContent = '已重置為 Flat：' + NUM_POINTS + ' 點。先確認 recall@5=100%，再切 IVF／HNSW：HNSW 預設 ef=' + HNSW_DEFAULT_EF + '，再往下調看漏檢。';
  }

  idxBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      setIndex(btn.getAttribute('data-idx'));
    });
  });

  elParam.addEventListener('input', function () {
    param = parseInt(elParam.value, 10);
    elParamVal.textContent = String(param);
    runQuery();
  });

  demo.querySelector('#btn-random-q').addEventListener('click', function () {
    query = { x: 0.08 + Math.random() * 0.84, y: 0.08 + Math.random() * 0.84 };
    runQuery();
  });
  demo.querySelector('#btn-reset').addEventListener('click', resetDemo);

  canvas.addEventListener('click', function (e) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    var pad = 28;
    var cx = (e.clientX - rect.left) * scaleX;
    var cy = (e.clientY - rect.top) * scaleY;
    query.x = Math.max(0, Math.min(1, (cx - pad) / (canvas.width - 2 * pad)));
    query.y = Math.max(0, Math.min(1, (cy - pad) / (canvas.height - 2 * pad)));
    runQuery();
  });

  resetDemo();
})();
</script>
