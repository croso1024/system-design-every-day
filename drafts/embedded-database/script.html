<script>
(function () {
  /* ---- tunables (縮小量級便於觀察) ---- */
  var CAP = 8;        // MemTable 容量（keys）
  var L0_STALL = 6;   // L0 檔數達此值 → 寫入 stall
  var WAL_CKPT = 4;   // SQLite WAL 累積達此值 → 自動 checkpoint
  var PAGES = 6;      // B-Tree 資料頁槽數

  /* ---- shared ---- */
  var keyId = 0;
  var writeCount = 0;
  var getIdx = 0;
  var lastProbe = null;   // GET 動畫用：{ sqPage, inMem, hitId }

  /* ---- SQLite state ---- */
  var wal = 0;
  var committed = 0;
  var pages = [];         // 每頁：{ rows }
  var lastPage = -1;      // 剛更新的頁（高亮）

  /* ---- RocksDB state ---- */
  var mem = [];           // MemTable：key id 陣列
  var l0 = [];            // [{ id, keys:[...] }]
  var l1 = [];            // [{ id, keys:[...] }]
  var sstId = 0;
  var compactions = 0;
  var stalled = false;

  function initPages() {
    pages = [];
    for (var i = 0; i < PAGES; i++) pages.push({ rows: 0 });
  }

  var $ = function (id) { return document.getElementById(id); };
  var elWal = $('emb-wal'), elBtree = $('emb-btree'),
      elMem = $('emb-mem'), elL0 = $('emb-l0'), elL1 = $('emb-l1'),
      elSqM = $('emb-sqlite-metrics'), elRkM = $('emb-rocks-metrics'),
      elCounter = $('emb-counter'), elStatus = $('emb-status');

  function tile(cls, txt, title) {
    return '<span class="emb-tile ' + cls + '"' + (title ? ' title="' + title + '"' : '') + '>' + txt + '</span>';
  }
  function metric(k, v) { return '<span><strong>' + k + '</strong>：' + v + '</span>'; }
  function setStatus(t) { elStatus.textContent = t; }

  /* ---------------- mutations ---------------- */

  // 一筆寫入同時餵給兩個引擎；回傳兩邊敘事
  function applyWrite() {
    lastProbe = null;
    keyId++; writeCount++;
    var k = keyId;

    /* SQLite：B-Tree 原地更新 + WAL append + commit */
    var pg = k % PAGES;
    pages[pg].rows++;
    lastPage = pg;
    committed++;
    wal++;
    var sqNote = 'SQLite：原地翻新頁 p' + (pg + 1) + '（B-Tree），append WAL';
    if (wal >= WAL_CKPT) { wal = 0; sqNote += '，WAL 滿 → checkpoint 合併回 .db'; }

    /* RocksDB：WAL + MemTable，滿了 flush 成 L0 */
    var rkNote;
    if (stalled) {
      rkNote = 'RocksDB：已 stall，拒收新寫入（compaction 跟不上）；SQLite 不受影響';
    } else {
      mem.push(k);
      if (mem.length >= CAP) {
        sstId++;
        l0.push({ id: sstId, keys: mem.slice() });
        mem = [];
        rkNote = 'RocksDB：MemTable 滿 → flush 成 L0 SST #' + sstId;
        if (l0.length >= L0_STALL) { stalled = true; rkNote += '；L0 堆積 → 寫入 stall！'; }
      } else {
        rkNote = 'RocksDB：寫入落 MemTable（' + mem.length + '/' + CAP + '），append WAL';
      }
    }
    return { sq: sqNote, rk: rkNote };
  }

  // Compaction：RocksDB 合併 L0→L1；SQLite 手動 checkpoint
  function applyCompact() {
    lastProbe = null;
    var rkNote;
    if (l0.length > 0) {
      var take = Math.min(l0.length, 3);
      var merged = [];
      for (var i = 0; i < take; i++) merged = merged.concat(l0[i].keys);
      l0 = l0.slice(take);
      sstId++;
      l1.push({ id: sstId, keys: merged });
      compactions++;
      stalled = l0.length >= L0_STALL;
      rkNote = 'RocksDB：compaction 合併 ' + take + ' 個 L0 → L1 SST #' + sstId +
               '（候選檔變少、read amp 下降' + (stalled ? '，但仍 stall' : '') + '）';
    } else {
      rkNote = 'RocksDB：L0 已空，無需 compaction';
    }
    var sqNote = wal > 0 ? 'SQLite：手動 WAL checkpoint，WAL 清空' : 'SQLite：WAL 已空，無需 checkpoint';
    wal = 0;
    return { sq: sqNote, rk: rkNote };
  }

  // GET：挑一個已存在的 key，對比兩邊讀取路徑
  function applyGet() {
    var keys = [];
    mem.forEach(function (k) { keys.push({ k: k, loc: 'mem' }); });
    l0.forEach(function (s) { s.keys.forEach(function (k) { keys.push({ k: k, id: s.id }); }); });
    l1.forEach(function (s) { s.keys.forEach(function (k) { keys.push({ k: k, id: s.id }); }); });
    if (keys.length === 0) {
      lastProbe = null;
      return '尚未寫入任何 key，先「寫入」再 GET。';
    }
    var pick = keys[getIdx % keys.length];
    getIdx++;
    var target = pick.k;
    var pg = target % PAGES;
    var candidates = l0.length + l1.length;   // 磁碟上的 SST 候選檔數

    if (pick.loc === 'mem') {
      lastProbe = { sqPage: pg, inMem: true, hitId: null };
      return 'GET key#' + target + ' ｜ SQLite：B-Tree 一次命中頁 p' + (pg + 1) + '（read amp = 1）' +
             ' ｜ RocksDB：命中 MemTable（記憶體，免讀磁碟）';
    }
    lastProbe = { sqPage: pg, inMem: false, hitId: pick.id };
    var skipped = candidates - 1;
    return 'GET key#' + target + ' ｜ SQLite：B-Tree 一次命中頁 p' + (pg + 1) + '（read amp = 1）' +
           ' ｜ RocksDB：Bloom filter 跳過 ' + skipped + ' 檔，只讀 1 檔命中（若無 bloom，最壞要掃全部 ' + candidates + ' 檔）';
  }

  /* ---------------- render ---------------- */

  function renderSQLite() {
    var w = '';
    for (var i = 0; i < WAL_CKPT; i++) w += tile(i < wal ? 'wait' : 'idle', '', '');
    elWal.innerHTML = w + '<span class="emb-cap">' + wal + '/' + WAL_CKPT + '</span>';

    var b = '';
    for (var p = 0; p < PAGES; p++) {
      var cls;
      if (lastProbe && lastProbe.sqPage === p) cls = 'hit';
      else if (p === lastPage) cls = 'hot';
      else cls = pages[p].rows > 0 ? 'ok' : 'idle';
      b += tile(cls, 'p' + (p + 1), pages[p].rows + ' rows');
    }
    elBtree.innerHTML = b;

    elSqM.innerHTML =
      metric('Committed TX', committed) +
      metric('WAL', wal) +
      metric('Writer lock', '單一') +
      metric('Read amp', '1');
  }

  function sstRow(arr) {
    var s = '';
    arr.forEach(function (t) {
      var cls;
      if (lastProbe && !lastProbe.inMem) cls = (t.id === lastProbe.hitId) ? 'hit' : 'skip';
      else cls = 'ok';
      s += tile(cls, '#' + t.id, t.keys.length + ' keys');
    });
    return s;
  }

  function renderRocks() {
    var memHit = lastProbe && lastProbe.inMem;
    var m = '';
    for (var i = 0; i < CAP; i++) {
      var mc = i < mem.length ? (memHit ? 'hit' : (mem.length >= CAP ? 'bad' : 'lock')) : 'idle';
      m += tile(mc, '', '');
    }
    elMem.innerHTML = m + '<span class="emb-cap">' + mem.length + '/' + CAP + (mem.length >= CAP ? ' 滿' : '') + '</span>';

    elL0.innerHTML = l0.length ? sstRow(l0) : '<span class="emb-cap">（空）</span>';
    elL1.innerHTML = l1.length ? sstRow(l1) : '<span class="emb-cap">（空）</span>';

    var wa = (1 + (l0.length + l1.length) * 0.2 + compactions * 0.4).toFixed(1);
    elRkM.innerHTML =
      metric('Write amp', '~' + wa + '×') +
      metric('L0 檔', l0.length) +
      metric('Compactions', compactions) +
      metric('Stall', stalled ? 'yes' : 'no');
  }

  function render() {
    renderSQLite();
    renderRocks();
    elCounter.textContent = '寫入總數：' + writeCount;
  }

  /* ---------------- handlers ---------------- */

  function onWrite() {
    var n = applyWrite();
    render();
    setStatus(n.sq + ' ｜ ' + n.rk);
  }

  function onBatch() {
    for (var i = 0; i < 5; i++) applyWrite();
    render();
    setStatus('批次 ×5 完成 ｜ SQLite committed=' + committed +
      ' ｜ RocksDB MemTable=' + mem.length + '/' + CAP + '、L0=' + l0.length + ' 檔' +
      (stalled ? '（已 stall，需 compaction）' : ''));
  }

  function onGet() { setStatus(applyGet()); render(); }

  function onCompact() {
    var n = applyCompact();
    render();
    setStatus(n.sq + ' ｜ ' + n.rk);
  }

  function reset() {
    keyId = 0; writeCount = 0; getIdx = 0; lastProbe = null;
    wal = 0; committed = 0; initPages(); lastPage = -1;
    mem = []; l0 = []; l1 = []; sstId = 0; compactions = 0; stalled = false;
    render();
    setStatus('已重置。按「寫入 1 筆」或「批次寫入 ×5」，同一批寫入會同時餵給 SQLite 與 RocksDB。');
  }

  $('btn-write').addEventListener('click', onWrite);
  $('btn-batch').addEventListener('click', onBatch);
  $('btn-get').addEventListener('click', onGet);
  $('btn-compact').addEventListener('click', onCompact);
  $('btn-reset').addEventListener('click', reset);

  /* ---- demo-scoped styles（淺色，對齊全站 palette） ---- */
  var style = document.createElement('style');
  style.textContent = [
    '#demo-embedded .eng-col{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;background:var(--bg-soft);min-height:150px}',
    '#demo-embedded .eng-title{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:12px}',
    '#demo-embedded .eng-row{margin-bottom:12px}',
    '#demo-embedded .eng-row .rl{display:block;font-family:var(--mono);font-size:11px;color:var(--text-3);margin-bottom:5px}',
    '#demo-embedded .eng-metrics{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;margin-top:6px;padding-top:10px;border-top:1px solid var(--border);color:var(--text-2)}',
    '#demo-embedded .emb-tile{display:inline-block;box-sizing:border-box;min-width:16px;height:22px;line-height:18px;padding:1px 6px;margin:2px;border-radius:4px;font-family:var(--mono);font-size:10px;text-align:center;vertical-align:middle}',
    '#demo-embedded .emb-tile.idle{background:#fff;border:1px solid #dedcd8;color:#b8b4ad}',
    '#demo-embedded .emb-tile.wait{background:#eef2f7;border:1px solid #3f6188;color:#3f6188}',
    '#demo-embedded .emb-tile.lock{background:#f6f0e7;border:1px solid #a3743e;color:#a3743e}',
    '#demo-embedded .emb-tile.hot{background:#f6f0e7;border:1px solid #a3743e;color:#7a5321;box-shadow:0 0 0 2px #ead9bf}',
    '#demo-embedded .emb-tile.ok{background:#eef4f1;border:1px solid #4d7d68;color:#3c6553}',
    '#demo-embedded .emb-tile.bad{background:#f6ecea;border:1px solid #a8554f;color:#a8554f}',
    '#demo-embedded .emb-tile.hit{background:#eef4f1;border:2px solid #4d7d68;color:#2f5544;font-weight:700}',
    '#demo-embedded .emb-tile.skip{background:#f4f3f1;border:1px dashed #cfccc6;color:#c3bfb8;opacity:.55}',
    '#demo-embedded .emb-cap{font-family:var(--mono);font-size:11px;color:var(--text-3);margin-left:8px}',
    '#demo-embedded .ns-idle{background:#fff;border:1px solid #dedcd8}',
    '#demo-embedded .ns-lock{background:#f6f0e7;border:1px solid #a3743e}',
    '#demo-embedded .ns-ok{background:#eef4f1;border:1px solid #4d7d68}',
    '#demo-embedded .ns-bad{background:#f6ecea;border:1px solid #a8554f}',
    '#demo-embedded .ns-wait{background:#eef2f7;border:1px solid #3f6188}',
    '@media(max-width:640px){#demo-embedded .eng-grid{grid-template-columns:1fr}}'
  ].join('');
  document.head.appendChild(style);

  initPages();
  reset();
})();
</script>
