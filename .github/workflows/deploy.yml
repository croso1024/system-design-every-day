name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queue.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run Status Files Validation
        run: node scripts/validate.js

      # Stamp homepage with the commit actually being deployed (not generate-time HEAD).
      # Requires <!-- BUILD_META --> placeholder in books/index.html (from books.js template).
      - name: Inject homepage build meta
        run: node scripts/inject-build-meta.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'books/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
