<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- TITLE_PLACEHOLDER --> | System Design Every Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: true,
      theme: 'default',
      securityLevel: 'loose'
    });
  </script>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #fafaf9;
      --text: #262a2f;
      --text-2: #6b7078;
      --text-3: #9aa0a8;
      --border: #ecebe8;
      --border-strong: #dedcd8;
      --code-bg: #f6f5f3;
      --accent: #3f6188;
      --accent-soft: #eef2f7;
      --accent-line: #cdd9e6;
      --ok: #4d7d68;
      --ok-soft: #eef4f1;
      --warn: #a3743e;
      --warn-soft: #f6f0e7;
      --bad: #a8554f;
      --bad-soft: #f6ecea;
      --radius: 10px;
      --radius-sm: 7px;
      --maxw: 760px;
      --sans: "Noto Sans TC", system-ui, -apple-system, "Segoe UI", sans-serif;
      --mono: "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }
      * {
        animation-duration: .001ms !important;
        transition-duration: .001ms !important;
      }
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 400;
      font-size: 16px;
      line-height: 1.78;
      -webkit-font-smoothing: antialiased;
      letter-spacing: .005em;
    }

    ::selection {
      background: var(--accent-soft);
    }

    /* ---------- layout ---------- */
    .wrap {
      display: flex;
      max-width: 1180px;
      margin: 0 auto;
      gap: 0;
    }

    .toc {
      width: 248px;
      flex: 0 0 248px;
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 54px 22px 40px 28px;
      overflow-y: auto;
      border-right: 1px solid var(--border);
    }

    .toc-kicker {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 20px;
    }

    .toc-kicker a {
      color: var(--text-3);
      text-decoration: none;
      border-bottom: none;
      transition: color .15s;
    }

    .toc-kicker a:hover {
      color: var(--text);
    }

    .toc-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
      margin: 0 0 24px;
    }

    .toc a {
      display: flex;
      gap: 10px;
      align-items: baseline;
      text-decoration: none;
      color: var(--text-2);
      font-size: 13.5px;
      padding: 6px 10px;
      border-radius: 6px;
      line-height: 1.45;
      transition: background .15s, color .15s;
      border-bottom: none;
    }

    .toc a:hover {
      background: var(--bg-soft);
      color: var(--text);
      border-bottom: none;
    }

    .toc a.active {
      color: var(--accent);
      background: var(--accent-soft);
      font-weight: 500;
      border-bottom: none;
    }

    .toc a .n {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      flex: 0 0 18px;
    }

    .toc a.active .n {
      color: var(--accent);
    }

    main {
      flex: 1 1 auto;
      min-width: 0;
      padding: 0 40px;
    }

    .inner {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 72px 0 140px;
    }

    /* ---------- hero ---------- */
    .hero {
      margin-bottom: 64px;
    }

    .hero .eyebrow {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
    }

    .hero h1 {
      font-size: 40px;
      line-height: 1.18;
      font-weight: 700;
      margin: 0 0 18px;
      letter-spacing: -.01em;
    }

    .hero .lede {
      font-size: 18px;
      line-height: 1.7;
      color: var(--text-2);
      font-weight: 300;
      margin: 0;
      max-width: 620px;
    }

    .hero .meta {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-2);
      border: 1px solid var(--border-strong);
      padding: 4px 11px;
      border-radius: 999px;
      background: var(--bg-soft);
    }

    /* ---------- sections ---------- */
    section {
      padding-top: 30px;
      scroll-margin-top: 24px;
    }

    .sec-head {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin: 0 0 8px;
    }

    .sec-num {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-3);
      font-weight: 500;
      padding-top: 6px;
      flex: 0 0 auto;
    }

    h2 {
      font-size: 27px;
      font-weight: 700;
      line-height: 1.3;
      margin: 0;
      letter-spacing: -.01em;
    }

    .sec-sub {
      color: var(--text-2);
      font-size: 15px;
      margin: 2px 0 28px 0;
      font-weight: 300;
    }

    h3 {
      font-size: 18.5px;
      font-weight: 700;
      margin: 38px 0 12px;
      line-height: 1.45;
    }

    h4 {
      font-size: 15.5px;
      font-weight: 700;
      margin: 26px 0 8px;
      color: var(--text);
    }

    p {
      margin: 0 0 16px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent-line);
      transition: border-color .15s;
    }

    a:hover {
      border-color: var(--accent);
    }

    strong {
      font-weight: 700;
    }

    em {
      font-style: normal;
      background: var(--accent-soft);
      padding: 0 4px;
      border-radius: 4px;
      font-weight: 500;
      color: #2f4d6e;
    }

    hr.div {
      border: none;
      border-top: 1px solid var(--border);
      margin: 46px 0;
    }

    ul, ol {
      margin: 0 0 18px;
      padding-left: 22px;
    }

    li {
      margin: 7px 0;
      padding-left: 4px;
    }

    li::marker {
      color: var(--text-3);
    }

    code {
      font-family: var(--mono);
      font-size: .86em;
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 5px;
      color: #43494f;
    }

    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      overflow-x: auto;
      margin: 0 0 20px;
      line-height: 1.6;
    }

    pre code {
      background: none;
      padding: 0;
      font-size: 13px;
    }

    /* ---------- math notation ---------- */
    /* 行內數學變數，如 W、R、N。本站不載入 MathJax/KaTeX，請勿使用 $...$ 或 \[...\] LaTeX 分隔符。 */
    var {
      font-family: var(--mono);
      font-style: normal;
      font-weight: 500;
      color: var(--accent);
    }

    /* 區塊數學公式，置中等寬呈現，記得將 > < & 轉義為 &gt; &lt; &amp;。 */
    .formula {
      font-family: var(--mono);
      font-size: 15px;
      text-align: center;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      margin: 0 0 20px;
      color: var(--text);
      letter-spacing: .03em;
      overflow-x: auto;
    }

    /* ---------- callouts ---------- */
    .callout {
      border: 1px solid var(--border);
      border-left: 3px solid var(--border-strong);
      background: var(--bg-soft);
      border-radius: var(--radius-sm);
      padding: 15px 18px;
      margin: 0 0 22px;
      font-size: 14.5px;
    }

    .callout .c-title {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .02em;
      margin-bottom: 5px;
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .callout p:last-child {
      margin-bottom: 0;
    }

    .callout.accent {
      border-left-color: var(--accent);
      background: var(--accent-soft);
    }

    .callout.accent .c-title {
      color: #2f4d6e;
    }

    .callout.warn {
      border-left-color: var(--warn);
      background: var(--warn-soft);
    }

    .callout.warn .c-title {
      color: var(--warn);
    }

    .callout .ic {
      font-family: var(--mono);
      font-size: 11px;
      border: 1px solid currentColor;
      border-radius: 4px;
      padding: 0 4px;
      line-height: 1.5;
      opacity: .8;
    }

    .oneliner {
      border: 1px dashed var(--accent-line);
      border-radius: var(--radius-sm);
      padding: 13px 16px;
      margin: 0 0 22px;
      font-size: 14.5px;
      background: #fbfcfd;
    }

    .oneliner b {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .08em;
      color: var(--accent);
      display: block;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    /* ---------- tables ---------- */
    .tbl-wrap {
      overflow-x: auto;
      margin: 0 0 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 14px;
      min-width: 520px;
    }

    th, td {
      text-align: left;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      font-weight: 700;
      background: var(--bg-soft);
      font-size: 12.5px;
      letter-spacing: .02em;
      color: var(--text-2);
      position: sticky;
      top: 0;
    }

    tr:last-child td {
      border-bottom: none;
    }

    td.hl {
      background: var(--accent-soft);
    }

    .cap {
      font-size: 12.5px;
      color: var(--text-3);
      margin: -12px 0 26px;
      font-family: var(--mono);
    }

    /* ---------- interactive shell ---------- */
    .demo {
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--bg);
      margin: 24px 0 26px;
      overflow: hidden;
    }

    .demo-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-soft);
    }

    .demo-bar .label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .demo-body {
      padding: 20px 18px;
    }

    .seg {
      display: inline-flex;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      overflow: hidden;
      background: var(--bg);
    }

    .seg button {
      border: none;
      background: none;
      font-family: var(--sans);
      font-size: 12.5px;
      color: var(--text-2);
      padding: 6px 14px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .seg button:hover {
      color: var(--text);
    }

    .seg button[aria-pressed="true"] {
      background: var(--accent);
      color: #fff;
    }

    .btn {
      font-family: var(--sans);
      font-size: 13px;
      border: 1px solid var(--border-strong);
      background: var(--bg);
      color: var(--text);
      padding: 7px 16px;
      border-radius: 7px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    .btn:hover {
      background: var(--bg-soft);
      border-color: var(--text-3);
    }

    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn.primary:hover {
      background: #365578;
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .btn:focus-visible, .seg button:focus-visible, .toc a:focus-visible, a:focus-visible,
    summary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .status-line {
      font-size: 13.5px;
      color: var(--text-2);
      min-height: 42px;
      margin-top: 14px;
      background: var(--bg-soft);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      border: 1px solid var(--border);
    }

    .status-line b {
      color: var(--text);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      font-size: 11.5px;
      color: var(--text-2);
      margin-top: 14px;
      font-family: var(--mono);
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 3px;
      display: inline-block;
      border: 1px solid rgba(0, 0, 0, .08);
    }

    /* node states used across diagrams */
    .nstate-idle {
      fill: #fff;
      stroke: var(--border-strong);
    }

    .ns-idle {
      background: #fff;
      border-color: var(--border-strong);
    }

    .ns-lock {
      background: var(--warn-soft);
      border-color: var(--warn);
    }

    .ns-ok {
      background: var(--ok-soft);
      border-color: var(--ok);
    }

    .ns-bad {
      background: var(--bad-soft);
      border-color: var(--bad);
    }

    .ns-wait {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    /* spectrum */
    .spectrum {
      position: relative;
      margin: 26px 6px 10px;
    }

    .spec-track {
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, #9fb6cf, #e7e5e1 50%, #c9d8c9);
      position: relative;
    }

    .spec-ends {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-2);
      margin-top: 10px;
    }

    .spec-mark {
      position: absolute;
      top: -12px;
      transform: translateX(-50%);
      cursor: pointer;
      text-align: center;
      background: none;
      border: none;
      padding: 0;
    }

    .spec-mark .pin {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--border-strong);
      margin: 0 auto;
      transition: border-color .15s, transform .15s, box-shadow .15s;
      display: block;
    }

    .spec-mark .pn {
      font-family: var(--mono);
      font-size: 12px;
      margin-top: 8px;
      color: var(--text-2);
      font-weight: 500;
      white-space: nowrap;
      display: block;
    }

    .spec-mark[aria-pressed="true"] .pin {
      border-color: var(--accent);
      transform: scale(1.18);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .spec-mark[aria-pressed="true"] .pn {
      color: var(--accent);
    }

    .spec-panel {
      margin-top: 34px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      background: var(--bg-soft);
    }

    .spec-panel h4 {
      margin: 0 0 4px;
    }

    .spec-panel .pmeta {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 14px;
    }

    .bars {
      display: grid;
      grid-template-columns: 78px 1fr 56px;
      gap: 9px 12px;
      align-items: center;
    }

    .bars .blabel {
      font-size: 13px;
      color: var(--text-2);
    }

    .bars .btrack {
      height: 8px;
      background: #e9e7e3;
      border-radius: 4px;
      overflow: hidden;
    }

    .bars .bfill {
      height: 100%;
      border-radius: 4px;
      background: var(--accent);
      transition: width .4s ease;
    }

    .bars .bval {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-2);
      text-align: right;
    }

    /* generic actor diagram */
    .actors {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .actor {
      flex: 1 1 0;
      min-width: 96px;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 11px 10px;
      text-align: center;
      background: #fff;
      transition: background .25s, border-color .25s;
    }

    .actor .aname {
      font-weight: 700;
      font-size: 13px;
    }

    .actor .arole {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .actor .astate {
      font-size: 11.5px;
      margin-top: 8px;
      font-family: var(--mono);
      color: var(--text-2);
      min-height: 16px;
    }

    .coordinator {
      border-style: dashed;
    }

    .flowsteps {
      margin-top: 16px;
    }

    .stepitem {
      display: flex;
      gap: 11px;
      font-size: 13.5px;
      padding: 7px 0;
      color: var(--text-3);
      border-top: 1px solid var(--border);
    }

    .stepitem:first-child {
      border-top: none;
    }

    .stepitem.done {
      color: var(--text);
    }

    .stepitem.cur {
      color: var(--text);
      font-weight: 500;
    }

    .stepitem .sx {
      font-family: var(--mono);
      font-size: 11px;
      flex: 0 0 26px;
      color: var(--text-3);
      padding-top: 2px;
    }

    .stepitem.cur .sx {
      color: var(--accent);
    }

    /* timeline lab (TCC) */
    .tl-scenarios {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 6px;
    }

    .tl-opt {
      display: flex;
      gap: 11px;
      align-items: flex-start;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      cursor: pointer;
      background: #fff;
      transition: border-color .15s, background .15s;
    }

    .tl-opt:hover {
      background: var(--bg-soft);
    }

    .tl-opt[aria-pressed="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .tl-opt .tlname {
      font-weight: 700;
      font-size: 13.5px;
    }

    .tl-opt .tldesc {
      font-size: 12.5px;
      color: var(--text-2);
      margin-top: 2px;
    }

    .tl-opt .tlbadge {
      font-family: var(--mono);
      font-size: 10px;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      padding: 1px 5px;
      color: var(--text-3);
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .tl-result {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    @media (max-width: 560px) {
      .tl-result {
        grid-template-columns: 1fr;
      }
    }

    .tl-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 14px;
      font-size: 13px;
    }

    .tl-card .tch {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: var(--text-3);
    }

    .tl-card.naive {
      border-left: 3px solid var(--bad);
    }

    .tl-card.fixed {
      border-left: 3px solid var(--ok);
    }

    .tl-card .verdict {
      font-weight: 700;
      margin-top: 8px;
      font-size: 13px;
    }

    .tl-card.naive .verdict {
      color: var(--bad);
    }

    .tl-card.fixed .verdict {
      color: var(--ok);
    }

    /* saga chain */
    .saga-chain {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 8px;
    }

    .saga-step {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .saga-box {
      flex: 1 1 auto;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      transition: .25s;
    }

    .saga-box .sgn {
      font-weight: 600;
      font-size: 13.5px;
    }

    .saga-box .sgs {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
    }

    .saga-arrow {
      height: 18px;
      width: 2px;
      background: var(--border-strong);
      margin-left: 18px;
    }

    .saga-pick {
      font-size: 12.5px;
      color: var(--text-2);
      margin: 4px 0 10px;
    }

    .saga-pick select {
      font-family: var(--sans);
      font-size: 13px;
      padding: 5px 8px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
    }

    /* outbox toggle */
    .ob-stage {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .ob-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .ob-chip {
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      background: #fff;
      font-size: 13px;
      transition: .25s;
      flex: 0 0 auto;
    }

    .ob-chip .obt {
      font-weight: 600;
    }

    .ob-chip .obs {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--text-3);
    }

    .ob-flow {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
    }

    /* wizard */
    .wiz-q {
      margin-bottom: 16px;
    }

    .wiz-q .wq {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .wiz-opts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .wiz-opts button {
      font-family: var(--sans);
      font-size: 13px;
      border: 1px solid var(--border-strong);
      background: #fff;
      color: var(--text-2);
      padding: 7px 14px;
      border-radius: 7px;
      cursor: pointer;
      transition: .15s;
    }

    .wiz-opts button:hover {
      border-color: var(--text-3);
      color: var(--text);
    }

    .wiz-opts button[aria-pressed="true"] {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .wiz-result {
      margin-top: 18px;
      border: 1px solid var(--accent-line);
      border-radius: var(--radius);
      padding: 16px 18px;
      background: var(--accent-soft);
      font-size: 14px;
      display: none;
    }

    .wiz-result.show {
      display: block;
    }

    .wiz-result .wr-pick {
      font-size: 17px;
      font-weight: 700;
      color: #2f4d6e;
      margin-bottom: 6px;
    }

    .wiz-result .wr-why {
      color: #3a5572;
    }

    /* FAQ */
    details.faq {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      background: #fff;
      overflow: hidden;
    }

    details.faq summary {
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 600;
      font-size: 14.5px;
      list-style: none;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    details.faq summary::-webkit-details-marker {
      display: none;
    }

    details.faq summary .q {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      flex: 0 0 auto;
    }

    details.faq summary .chev {
      transition: transform .2s;
      color: var(--text-3);
      flex: 0 0 auto;
      font-size: 13px;
    }

    details.faq[open] summary .chev {
      transform: rotate(90deg);
    }

    details.faq .ans {
      padding: 0 16px 16px;
      font-size: 14px;
      color: var(--text-2);
    }

    details.faq .ans p {
      margin: 0 0 10px;
    }

    details.faq .ans p:last-child {
      margin: 0;
    }

    .trap {
      display: flex;
      gap: 10px;
      font-size: 14px;
      margin: 9px 0;
    }

    .trap .tn {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--bad);
      flex: 0 0 auto;
      border: 1px solid var(--bad-soft);
      background: var(--bad-soft);
      border-radius: 4px;
      padding: 1px 6px;
      height: fit-content;
      margin-top: 2px;
    }

    /* mobile responsive */
    .toc-toggle {
      display: none;
    }

    @media (max-width: 920px) {
      .wrap {
        flex-direction: column;
      }
      .toc {
        position: static;
        width: auto;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 18px 22px;
      }
      .toc-title {
        margin-bottom: 0;
      }
      .toc-kicker {
        margin-bottom: 10px;
      }
      .toc-nav {
        display: none;
        margin-top: 16px;
      }
      .toc-nav.open {
        display: block;
      }
      .toc-toggle {
        display: inline-block;
        margin-top: 10px;
      }
      main {
        padding: 0 22px;
      }
      .inner {
        padding: 40px 0 100px;
      }
      .hero h1 {
        font-size: 31px;
      }
    }

    @media (max-width: 480px) {
      body {
        font-size: 15px;
      }
      .hero h1 {
        font-size: 27px;
      }
      h2 {
        font-size: 23px;
      }
      .demo-body {
        padding: 16px 13px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- ===================== TOC SIDEBAR ===================== -->
    <nav class="toc" aria-label="目錄">
      <div class="toc-kicker"><a href="../index.html">← 返回目錄</a></div>
      <div class="toc-title"><!-- TITLE_PLACEHOLDER --></div>
      <button class="btn toc-toggle" aria-expanded="false">目錄 ▾</button>
      <div class="toc-nav">
        <!-- TOC_PLACEHOLDER -->
      </div>
    </nav>

    <!-- ===================== MAIN CONTENT ===================== -->
    <main>
      <div class="inner">
        <!-- CONTENT_PLACEHOLDER -->
      </div>
    </main>
  </div>

  <script>
    "use strict";
    document.addEventListener("DOMContentLoaded", function () {
      /* ===== TOC scrollspy & mobile toggle ===== */
      (function () {
        var links = Array.prototype.slice.call(document.querySelectorAll(".toc-nav a"));
        var map = {};
        links.forEach(function (a) {
          var href = a.getAttribute("href");
          if (href && href.startsWith("#")) {
            map[href.slice(1)] = a;
          }
        });
        var secs = links.map(function (a) {
          var href = a.getAttribute("href");
          return href && href.startsWith("#") ? document.getElementById(href.slice(1)) : null;
        }).filter(Boolean);

        if (secs.length > 0 && typeof IntersectionObserver !== "undefined") {
          var obs = new IntersectionObserver(function (entries) {
            entries.forEach(function (e) {
              if (e.isIntersecting) {
                links.forEach(function (l) { l.classList.remove("active"); });
                var act = map[e.target.id];
                if (act) act.classList.add("active");
              }
            });
          }, { rootMargin: "-20% 0px -70% 0px", threshold: 0 });
          secs.forEach(function (s) { obs.observe(s); });
        }

        var toggle = document.querySelector(".toc-toggle");
        var nav = document.querySelector(".toc-nav");
        if (toggle && nav) {
          toggle.addEventListener("click", function () {
            var open = nav.classList.toggle("open");
            toggle.setAttribute("aria-expanded", open ? "true" : "false");
          });
          nav.addEventListener("click", function (e) {
            if (e.target.closest("a") && window.innerWidth <= 920) {
              nav.classList.remove("open");
              toggle.setAttribute("aria-expanded", "false");
            }
          });
        }
      })();
    });
  </script>

  <!-- SCRIPT_PLACEHOLDER -->
</body>
</html>
